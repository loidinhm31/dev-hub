name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Rust tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server

      - name: Run tests
        run: cd server && cargo test --features vendored

  build-linux:
    name: Build (linux-x86_64)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server

      - name: Build release binary
        run: cd server && cargo build --release --features vendored

      - uses: actions/upload-artifact@v4
        with:
          name: dam-hopper-server-linux-x86_64
          path: server/target/release/dam-hopper-server
          if-no-files-found: error
          retention-days: 7

  build-windows:
    name: Build (windows-x86_64)
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server

      - name: Build release binary
        run: cd server && cargo build --release --features vendored

      - uses: actions/upload-artifact@v4
        with:
          name: dam-hopper-server-windows-x86_64
          path: server/target/release/dam-hopper-server.exe
          if-no-files-found: error
          retention-days: 7

  web:
    name: Web build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: packages/web/dist
          if-no-files-found: error
          retention-days: 7
